repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.10
    hooks:
      - id: ruff-check
        args: [--fix]
        files: ^backend/
      - id: ruff-format
        files: ^backend/

  - repo: local
    hooks:
      - id: basedpyright
        name: basedpyright
        entry: uv run --directory backend basedpyright src/
        language: system
        types: [python]
        files: ^backend/
        pass_filenames: false
