repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.10
    hooks:
      - id: ruff-check
        args: [--fix]
        files: ^backend/
      - id: ruff-format
        files: ^backend/

  - repo: local
    hooks:
      - id: basedpyright
        name: basedpyright
        entry: uv run --directory backend basedpyright src/
        language: system
        types: [python]
        files: ^backend/
        pass_filenames: false

      - id: prettier
        name: prettier
        entry: bash -c 'cd frontend && node_modules/.bin/prettier --write "${@#frontend/}"' --
        language: system
        files: ^frontend/.*\.(ts|tsx|js|jsx|json|jsonc|css|html|md|yaml|yml)$
        require_serial: true

      - id: eslint
        name: eslint
        entry: bash -c 'cd frontend && node_modules/.bin/eslint --fix "${@#frontend/}"' --
        language: system
        files: ^frontend/.*\.(ts|tsx|js|jsx)$
        require_serial: true
